name: Docker build

on:
  workflow_call:
    inputs:
      primary-tag:
        type: string
      base-image:
        type: string
      tags:
        type: string
      arches:
        type: string
      push:
        type: boolean
    secrets:
      DOCKERHUB_TOKEN:
        required: true

permissions: {}

defaults:
  run:
    shell: bash -euxo pipefail {0}

env:
  DOCKERHUB_USERNAME: zhongruoyu
  DOCKERHUB_REPOSITORY: zhongruoyu/homebrew-test-env
  GHCR_USERNAME: zhongruoyu
  GHCR_REPOSITORY: ghcr.io/zhongruoyu/homebrew-test-env

jobs:
  setup:
    name: Set up build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.metadata.outputs.tags }}
      labels: ${{ steps.metadata.outputs.labels }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Determine Docker image metadata
        id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.DOCKERHUB_REPOSITORY }}
            ${{ env.GHCR_REPOSITORY }}
          flavor: |
            latest=false
          tags: ${{ inputs.tags }}
      - name: Set up build matrix
        id: matrix
        run: |
          matrix_json='{"arch": []}'
          for ARCH in $ARCHES; do
            matrix_json="$(
              echo "$matrix_json" |
                jq --compact-output --arg arch "$ARCH" '.arch += [$arch]'
            )"
          done
          echo "matrix=$matrix_json" >>"$GITHUB_OUTPUT"
        env:
          ARCHES: ${{ inputs.arches }}

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    environment:
      name: docker
      deployment: false
    permissions:
      contents: read
      packages: write # for pushing image
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to Docker Hub
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ github.token }}
      - name: Set up build
        id: setup
        run: |
          {
            if [[ "$PUSH" = true ]]; then
              echo "outputs<<OUTPUTS"
              echo "type=image,name=$DOCKERHUB_REPOSITORY,name-canonical=true,push=true,push-by-digest=true"
              echo "type=image,name=$GHCR_REPOSITORY,name-canonical=true,push=true,push-by-digest=true"
              echo "OUTPUTS"
            else
              echo "outputs="
            fi
          } >> "$GITHUB_OUTPUT"
        env:
          PUSH: ${{ inputs.push }}
      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          platforms: linux/${{ matrix.arch }}
          labels: ${{ needs.setup.outputs.labels }}
          build-args: BASE_IMAGE=${{ inputs.base-image }}
          outputs: ${{ steps.setup.outputs.outputs }}
      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP"/digests
          echo "${DIGEST#sha256:}" >"$RUNNER_TEMP"/digests/"$PRIMARY_TAG-$ARCH"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          PRIMARY_TAG: ${{ inputs.primary-tag }}
          ARCH: ${{ matrix.arch }}
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ inputs.primary-tag }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*

  merge:
    name: Merge
    if: inputs.push
    needs: [setup, build]
    runs-on: ubuntu-latest
    environment:
      name: docker
      deployment: false
    permissions:
      contents: read
      packages: write # for pushing image
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ github.token }}
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.primary-tag }}-*
          merge-multiple: true
      - name: Create manifest list and push
        run: |
          mapfile -t tags <<< "$TAGS"
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag="$tag")
          done
          images=()
          for ARCH in $ARCHES; do
            images+=("$GHCR_REPOSITORY@sha256:$(cat "$RUNNER_TEMP"/digests/"$PRIMARY_TAG-$ARCH")")
          done
          docker buildx imagetools create "${tag_args[@]}" "${images[@]}"
        env:
          PRIMARY_TAG: ${{ inputs.primary-tag }}
          ARCHES: ${{ inputs.arches }}
          TAGS: ${{ needs.setup.outputs.tags }}
